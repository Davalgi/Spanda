image:
  repository: spanda-twin-cloud
  tag: latest
  pullPolicy: IfNotPresent

tenantId: default
apiKey: change-me-operator-key

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

ingress:
  enabled: false
  className: ""
  host: twins.example.com
  tls: false
