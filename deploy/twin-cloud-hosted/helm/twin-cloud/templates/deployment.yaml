apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twin-cloud.fullname" . }}
  labels:
    {{- include "twin-cloud.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "twin-cloud.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "twin-cloud.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: twin-cloud
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - control-center
            - serve
            - --bind
            - 0.0.0.0:8080
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPANDA_TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "twin-cloud.fullname" . }}-config
                  key: SPANDA_TENANT_ID
            - name: SPANDA_CONTROL_CENTER_STATE_DIR
              value: /var/lib/spanda
            - name: SPANDA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "twin-cloud.fullname" . }}-api-key
                  key: SPANDA_API_KEY
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: state
              mountPath: /var/lib/spanda
          {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "twin-cloud.fullname" . }}-state
      {{- end }}
