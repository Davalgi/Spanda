# Hosted Twin Cloud pilot — single-tenant Control Center with persisted twins.
# Usage: cp .env.example .env && docker compose up --build
services:
  twin-cloud:
    build:
      context: ../..
      dockerfile: deploy/twin-cloud-hosted/Dockerfile
    ports:
      - "${TWIN_CLOUD_HTTP_PORT:-8080}:8080"
    environment:
      SPANDA_API_KEY: ${SPANDA_API_KEY:?set SPANDA_API_KEY in .env}
      SPANDA_TENANT_ID: ${SPANDA_TENANT_ID:-default}
      SPANDA_CONTROL_CENTER_STATE_DIR: /var/lib/spanda
    volumes:
      - twin-cloud-state:/var/lib/spanda
    restart: unless-stopped

volumes:
  twin-cloud-state:
