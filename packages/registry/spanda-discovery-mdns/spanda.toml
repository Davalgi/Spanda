[package]
name = "spanda-discovery-mdns"
version = "0.1.0"
description = "mDNS/DNS-SD device discovery transport for Spanda Control Center"
license = "Apache-2.0"

[safety]
level = "sensors"

[capabilities]
required = [
  "network.discover",
]

[adapter]
provides = ["discovery.mdns"]
requires = ["network.udp"]
