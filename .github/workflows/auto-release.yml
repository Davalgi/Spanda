# Auto-release after CI Integration passes on main when the merged PR carries a release label.
#
# Label a PR before merge:
#   release:major — breaking changes / major features
#   release:minor — new features (default for substantial updates)
#   release:patch — fixes and small updates
#
# The bump commits to main and pushes vX.Y.Z, which triggers release.yml (cargo-dist).
# When the PR also changed Control Center paths, a matching desktop-v* tag is pushed too.

name: Auto release

on:
  workflow_run:
    workflows: ["CI Integration"]
    types:
      - completed

jobs:
  detect:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.label.outputs.bump }}
      desktop_bump: ${{ steps.label.outputs.desktop_bump }}
      skip: ${{ steps.skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Skip release bump commits
        id: skip
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" == chore:\ release\ v* ]] || [[ "$MSG" == chore:\ release\ desktop\ v* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already a release bump commit; skipping auto-release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve bump from merged PR labels
        if: steps.skip.outputs.skip != 'true'
        id: label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/pulls" --jq '.[0] // empty')
          if [ -z "$PR_JSON" ]; then
            echo "No associated pull request; skipping auto-release."
            echo "bump=" >> "$GITHUB_OUTPUT"
            echo "desktop_bump=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LABELS=$(echo "$PR_JSON" | jq -r '.labels[].name' | tr '\n' ' ')
          echo "Merged PR labels:${LABELS}"
          bump=""
          if [[ " $LABELS " == *" release:major "* ]]; then
            bump=major
          elif [[ " $LABELS " == *" release:minor "* ]]; then
            bump=minor
          elif [[ " $LABELS " == *" release:patch "* ]]; then
            bump=patch
          fi
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

          desktop_bump=""
          if [ -n "$bump" ]; then
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            mapfile -t FILES < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUM}/files" --jq '.[].filename')
            for path in "${FILES[@]}"; do
              case "$path" in
                packages/control-center-desktop/*|packages/web/*|crates/spanda-api/src/control_center*|crates/spanda-api/src/static/control-center-ui/*|crates/spanda-cli/src/control_center*|scripts/sync_control_center_embedded_ui.sh|scripts/control_center_*|scripts/verify_desktop_release_ready.sh)
                  desktop_bump="$bump"
                  break
                  ;;
              esac
            done
          fi
          echo "desktop_bump=$desktop_bump" >> "$GITHUB_OUTPUT"
          if [ -n "$desktop_bump" ]; then
            echo "Control Center paths changed; will bump desktop stream (${desktop_bump})."
          fi

  release:
    needs: detect
    if: >-
      needs.detect.result == 'success' &&
      needs.detect.outputs.skip != 'true' &&
      needs.detect.outputs.bump != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release-bump.yml
    with:
      bump: ${{ needs.detect.outputs.bump }}
      stream: workspace
      push_tag: true
      ref: ${{ github.event.workflow_run.head_sha }}

  desktop-release:
    needs: [detect, release]
    if: >-
      needs.detect.result == 'success' &&
      needs.detect.outputs.skip != 'true' &&
      needs.detect.outputs.desktop_bump != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release-bump.yml
    with:
      bump: ${{ needs.detect.outputs.desktop_bump }}
      stream: desktop
      push_tag: true
      ref: main
