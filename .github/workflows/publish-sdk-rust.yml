name: Publish Rust SDK

on:
  workflow_dispatch:
  push:
    tags:
      - 'crates-sdk-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      - name: Test spanda-sdk
        run: |
          cargo test -p spanda-sdk
          cargo test -p spanda-sdk --features grpc
      - name: Verify crate package
        run: cargo package -p spanda-sdk --allow-dirty
      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/crates-sdk-v')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p spanda-sdk
