name: Install protoc
description: Install protobuf-compiler for gRPC codegen in spanda-api builds.

runs:
  using: composite
  steps:
    - name: Install protoc
      shell: bash
      run: |
        if command -v protoc >/dev/null 2>&1; then
          protoc --version
          exit 0
        fi

        PROTOC_VERSION=25.3

        if [[ "${RUNNER_OS}" == "macOS" ]]; then
          brew install protobuf
        elif [[ "${RUNNER_OS}" == "Windows" ]]; then
          INSTALL_DIR="${RUNNER_TEMP}/protoc"
          mkdir -p "$INSTALL_DIR"
          curl -fsSL -o "${RUNNER_TEMP}/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-win64.zip"
          unzip -oq "${RUNNER_TEMP}/protoc.zip" -d "$INSTALL_DIR"
          echo "$INSTALL_DIR/bin" >> "$GITHUB_PATH"
          export PATH="$INSTALL_DIR/bin:$PATH"
        else
          # Avoid apt on GitHub-hosted Ubuntu: Microsoft mirror repos are occasionally
          # unsigned/broken and cause unrelated CI jobs (lint-rust) to fail on apt-get update.
          case "$(uname -m)" in
            x86_64|amd64) PROTOC_ARCH=linux-x86_64 ;;
            aarch64|arm64) PROTOC_ARCH=linux-aarch_64 ;;
            *)
              echo "unsupported Linux architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"
          sudo unzip -oq /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
        fi

        protoc --version
